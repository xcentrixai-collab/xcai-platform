name: Route Guard

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  guard-marketing-routes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check route collisions
        run: npm run guard:routes
